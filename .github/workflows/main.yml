steps:
      # Génère le serpent avec le thème sombre de GitHub (fond gris foncé)
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: moskysarah
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark
          
      # Déploie le fichier généré sur la branche output
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
